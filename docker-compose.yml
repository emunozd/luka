services:
  postgres:
    image: postgres:16-alpine
    container_name: luka-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Bogota
      PGTZ: America/Bogota
    volumes:
      - /var/lib/luka/pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - luka_net
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luka-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: luka-postgres
      POSTGRES_PORT: 5432
      TZ: America/Bogota
    networks:
      - luka_net
    ports:
      - "127.0.0.1:${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: luka-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LUKA_API_URL: http://luka-api:8000
      TZ: America/Bogota
    networks:
      - luka_net
    depends_on:
      - api
networks:
  luka_net:
    name: luka_net
    driver: bridge
